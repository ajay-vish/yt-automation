name: Daily Bhojpuri Short

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  make-short:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/pipeline.py

      - name: Commit updated state + draft prompt
        run: |
          git config user.name "shorts-bot"
          git config user.email "shorts-bot@users.noreply.github.com"
          git add state.json drafts/
          git commit -m "Daily short: update state + draft prompt" || echo "Nothing to commit"
          git push
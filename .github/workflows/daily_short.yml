name: Daily Bhojpuri Short

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
    
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  make-short:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-whisper-small

      - name: Install ffmpeg and Hindi fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto fonts-noto-cjk

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Install Deno (JS runtime needed by yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Upgrade yt-dlp to latest
        run: pip install -U yt-dlp

      - name: Write cookies file
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Run pipeline
        working-directory: .
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/pipeline.py

      - name: Clean up cookies file
        if: always()
        run: rm -f cookies.txt

      - name: Commit updated state + draft prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "shorts-bot"
          git config user.email "shorts-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add state.json
          git commit -m "Daily short: update state" || echo "Nothing to commit"
          git push
name: Post Shorts Comments

on:
  schedule:
    - cron: "10 2 * * *"   # ~10 min after 7:30 AM IST slot
    - cron: "40 7 * * *"   # ~10 min after 1:00 PM IST slot
    - cron: "40 13 * * *"  # ~10 min after 7:00 PM IST slot
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Post comments on newly-public Shorts
        env:
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python scripts/comments.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state.json [skip ci]"
          git push

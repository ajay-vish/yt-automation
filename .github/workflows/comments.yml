name: Post Shorts Comments

on:
  schedule:
    - cron: "35 7 * * *"   # 7:35 AM UTC -> 1:05 PM IST (5 min after 1:00 PM slot)
    - cron: "5 14 * * *"   # 2:05 PM UTC -> 7:35 PM IST (5 min after 7:30 PM slot)
    - cron: "35 15 * * *"  # 3:35 PM UTC -> 9:05 PM IST (5 min after 9:00 PM slot)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Post comments on newly-public Shorts
        env:
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python scripts/comments.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state.json [skip ci]"
          git push
